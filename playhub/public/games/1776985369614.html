<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble Pop - PlayHub Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .game-container {
      width: 90vw;
      max-width: 800px;
      height: 90vh;
      max-height: 600px;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.1), transparent 50%),
                  linear-gradient(135deg, #1e293b 0%, #2d1b69 100%);
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      color: #60a5fa;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .stats {
      display: flex;
      gap: 30px;
      color: white;
      font-size: 18px;
      font-weight: 600;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-label {
      font-size: 12px;
      color: #cbd5e1;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 24px;
      color: #fbbf24;
    }

    .game-area {
      flex: 1;
      position: relative;
      width: 100%;
      height: calc(100% - 90px);
    }

    .bubble {
      position: absolute;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      font-size: 14px;
      transition: transform 0.1s, box-shadow 0.1s;
      user-select: none;
      animation: rise 3s ease-in-out forwards;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2),
                  inset -2px -2px 5px rgba(0, 0, 0, 0.2),
                  inset 2px 2px 5px rgba(255, 255, 255, 0.3);
    }

    .bubble:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3),
                  inset -2px -2px 8px rgba(0, 0, 0, 0.3),
                  inset 2px 2px 8px rgba(255, 255, 255, 0.4);
    }

    .bubble.pop-animation {
      animation: pop 0.5s ease-out forwards;
    }

    @keyframes rise {
      0% {
        opacity: 0.7;
        transform: translateY(0);
      }
      100% {
        opacity: 0;
        transform: translateY(-600px);
      }
    }

    @keyframes pop {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.3);
      }
      100% {
        transform: scale(0);
        opacity: 0;
      }
    }

    .bubble-1 { background: linear-gradient(135deg, #ff6b6b, #ee5a6f); }
    .bubble-2 { background: linear-gradient(135deg, #4ecdc4, #44a08d); }
    .bubble-3 { background: linear-gradient(135deg, #ffd93d, #ffb700); }
    .bubble-4 { background: linear-gradient(135deg, #6bcbf0, #2d7dd2); }
    .bubble-5 { background: linear-gradient(135deg, #c084fc, #a855f7); }
    .bubble-6 { background: linear-gradient(135deg, #ff85c0, #f472b6); }

    .game-over {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .game-over.show {
      display: flex;
    }

    .game-over-content {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .game-over-title {
      font-size: 36px;
      color: white;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .game-over-score {
      font-size: 48px;
      color: #fbbf24;
      margin-bottom: 30px;
      font-weight: bold;
    }

    .game-over-label {
      font-size: 16px;
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    .restart-btn {
      background: linear-gradient(135deg, #4f46e5, #2563eb);
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 18px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
    }

    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(79, 70, 229, 0.4);
    }

    .start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      gap: 20px;
      z-index: 999;
    }

    .start-screen.hidden {
      display: none;
    }

    .start-content {
      text-align: center;
      color: white;
      animation: fadeIn 0.5s ease-out;
    }

    .start-content h1 {
      font-size: 48px;
      margin-bottom: 15px;
      color: #60a5fa;
    }

    .start-content p {
      font-size: 18px;
      color: #cbd5e1;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .start-btn {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      padding: 16px 50px;
      font-size: 20px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(16, 185, 129, 0.4);
    }

    .instructions {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 20px;
      line-height: 1.8;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <div class="title">🫧 Bubble Pop</div>
      <div class="stats">
        <div class="stat-item">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Time</span>
          <span class="stat-value" id="timer">30</span>
        </div>
      </div>
    </div>

    <div class="game-area">
      <div class="start-screen" id="startScreen">
        <div class="start-content">
          <h1>🫧 Bubble Pop</h1>
          <p>Click on the bubbles to pop them before they float away!</p>
          <button class="start-btn" onclick="startGame()">Start Game</button>
          <div class="instructions">
            ⏱️ You have 30 seconds<br>
            💯 Pop as many bubbles as you can<br>
            🎯 Each bubble = 10 points
          </div>
        </div>
      </div>

      <div class="game-over" id="gameOver">
        <div class="game-over-content">
          <div class="game-over-title">🎉 Game Over!</div>
          <div class="game-over-label">Final Score</div>
          <div class="game-over-score" id="finalScore">0</div>
          <button class="restart-btn" onclick="startGame()">Play Again</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let score = 0;
    let timeLeft = 30;
    let gameActive = false;
    let bubbleCount = 0;
    const colors = ['bubble-1', 'bubble-2', 'bubble-3', 'bubble-4', 'bubble-5', 'bubble-6'];

    function startGame() {
      score = 0;
      timeLeft = 30;
      gameActive = true;
      bubbleCount = 0;

      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameOver').classList.remove('show');
      document.getElementById('score').textContent = score;
      document.getElementById('timer').textContent = timeLeft;

      // Clear existing bubbles
      document.querySelectorAll('.bubble').forEach(b => b.remove());

      // Start spawning bubbles
      spawnBubbles();

      // Start timer
      const timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          endGame();
        }
      }, 1000);
    }

    function spawnBubbles() {
      if (!gameActive) return;

      const bubble = document.createElement('div');
      bubble.className = `bubble ${colors[Math.floor(Math.random() * colors.length)]}`;
      
      const size = Math.random() * 30 + 40; // 40-70px
      bubble.style.width = size + 'px';
      bubble.style.height = size + 'px';

      const gameArea = document.querySelector('.game-area');
      const x = Math.random() * (gameArea.offsetWidth - size);
      const y = gameArea.offsetHeight;

      bubble.style.left = x + 'px';
      bubble.style.top = y + 'px';

      bubble.textContent = '+10';

      bubble.onclick = () => popBubble(bubble);

      gameArea.appendChild(bubble);

      // Spawn next bubble
      const spawnDelay = Math.random() * 400 + 200; // 200-600ms
      if (gameActive) {
        setTimeout(spawnBubbles, spawnDelay);
      }
    }

    function popBubble(bubble) {
      if (!gameActive) return;

      bubble.classList.add('pop-animation');
      score += 10;
      document.getElementById('score').textContent = score;

      setTimeout(() => bubble.remove(), 500);
    }

    function endGame() {
      gameActive = false;
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOver').classList.add('show');

      // Remove all bubbles
      document.querySelectorAll('.bubble').forEach(b => b.remove());
    }

    // Initialize
    window.addEventListener('load', () => {
      document.getElementById('startScreen').classList.remove('hidden');
    });
  </script>
</body>
</html>
